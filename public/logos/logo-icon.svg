<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" aria-hidden="true">
  <!-- Círculo con borde dorado -->
  <circle cx="20" cy="20" r="19" fill="#0F2E23" stroke="#B8A060" stroke-width="1.5"/>
  <!-- Tres hojas de té estilizadas (tallo común, hojas con variación de verde) -->
  <g transform="translate(20, 20)">
    <!-- Hoja central -->
    <path d="M0 -8 Q4 -4 0 4 Q-4 -4 0 -8" fill="#3A6B5C" opacity="0.95"/>
    <!-- Hoja izquierda -->
    <path d="M-6 -2 Q-2 2 -6 6 Q-8 2 -6 -2" fill="#4A7B6C"/>
    <!-- Hoja derecha -->
    <path d="M6 -2 Q2 2 6 6 Q8 2 6 -2" fill="#4A7B6C"/>
    <!-- Tallo -->
    <path d="M0 4 v4" stroke="#2D5A4A" stroke-width="0.8" stroke-linecap="round" fill="none"/>
  </g>
</svg>
